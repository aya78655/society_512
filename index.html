<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国・四国地方 復習クイズ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f6f0; --surface: #ffffff; --surface2: #edf0e8;
    --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
    --text: #1c1f18; --text2: #5a6050; --text3: #9aa08a;
    --green-bg: #e6f2d6; --green-text: #2a5208; --green-border: #8cc44a;
    --red-bg: #fceaea; --red-text: #7a2020; --red-border: #e89090;
    --yellow-bg: #fef7e0; --yellow-text: #5c4200; --yellow-border: #e8c84a;
    --accent: #3a6e1a; --accent2: #5a9e2a;
    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 18px;
  }
  body {
    font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
    display: flex; align-items: flex-start; justify-content: center;
  }
  .container { width: 100%; max-width: 600px; }

  /* Header */
  .header { text-align: center; margin-bottom: 2rem; }
  .header .kamon {
    font-size: 40px; margin-bottom: 10px;
    display: block; letter-spacing: 0.05em;
  }
  .header .subtitle {
    font-size: 12px; letter-spacing: 0.12em; color: var(--text3);
    margin-bottom: 8px; text-transform: uppercase;
  }
  .header h1 {
    font-size: 24px; font-weight: 700; letter-spacing: -0.02em;
    margin-bottom: 4px; color: var(--accent);
  }
  .header .total {
    font-size: 14px; color: var(--text2);
  }

  /* Section selector */
  .section-wrap { margin-bottom: 1.5rem; }
  .section-label { font-size: 13px; color: var(--text2); margin-bottom: 10px; font-weight: 500; }
  .section-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .section-btn {
    padding: 7px 13px; font-size: 13px; font-family: inherit;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 20px; cursor: pointer; color: var(--text2);
    transition: all 0.15s; font-weight: 500;
  }
  .section-btn.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  /* Start screen */
  .start-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .start-item {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    border-left: 3px solid var(--accent2);
  }
  .start-item .label { font-size: 11px; color: var(--text3); margin-bottom: 3px; letter-spacing: 0.05em; }
  .start-item .value { font-size: 14px; font-weight: 600; color: var(--accent); }

  /* Progress */
  .progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
  .progress-label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .progress-bar-bg { flex: 1; height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }

  /* Question */
  .q-category { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
  .q-text { font-size: 17px; line-height: 1.8; color: var(--text); white-space: pre-line; font-weight: 500; }

  /* Input */
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .ans-input {
    flex: 1; padding: 13px 15px; font-size: 16px; font-family: inherit;
    border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .ans-input:focus { border-color: var(--accent); }
  .ans-input:disabled { background: var(--surface2); }

  /* Buttons */
  .btn {
    display: block; width: 100%; padding: 14px;
    font-size: 15px; font-family: inherit; font-weight: 600;
    text-align: center; background: var(--surface);
    border: 1.5px solid var(--border2); border-radius: var(--radius-md);
    cursor: pointer; color: var(--text); transition: all 0.15s;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #2d5614; }
  .btn-sm { padding: 11px 18px; font-size: 14px; width: auto; display: inline-block; }

  /* Hint */
  .hint-toggle {
    padding: 8px 14px; font-size: 13px; font-family: inherit;
    background: var(--yellow-bg); border: 1px solid var(--yellow-border);
    border-radius: 20px; cursor: pointer; color: var(--yellow-text);
    margin-bottom: 10px; transition: background 0.15s; font-weight: 500;
  }
  .hint-toggle:hover { background: #fdefc0; }
  .hint-box {
    background: var(--yellow-bg); border: 1px solid var(--yellow-border);
    border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 10px;
  }
  .hint-label { font-size: 11px; color: var(--yellow-text); font-weight: 700; margin-bottom: 8px; letter-spacing: 0.05em; }
  .hint-choices { display: flex; flex-wrap: wrap; gap: 6px; }
  .hint-choice {
    padding: 5px 12px; background: var(--surface); border: 1px solid var(--yellow-border);
    border-radius: 20px; font-size: 13px; cursor: pointer; color: var(--yellow-text);
    transition: background 0.15s; font-weight: 500;
  }
  .hint-choice:hover { background: #fdefc0; }

  /* Answer box */
  .answer-box { border-radius: var(--radius-sm); padding: 1rem 1.25rem; font-size: 15px; line-height: 1.7; margin-bottom: 10px; }
  .answer-box.correct { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green-text); }
  .answer-box.wrong { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red-text); }
  .answer-box.neutral { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .answer-box .mark { font-weight: 700; margin-bottom: 6px; font-size: 16px; }
  .answer-box .correct-ans { font-weight: 600; margin-bottom: 8px; }
  .answer-box .exp { font-size: 13px; opacity: 0.85; white-space: pre-line; }

  /* Multi */
  .multi-check-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .multi-check {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border: 1.5px solid var(--border2);
    border-radius: 20px; font-size: 14px; cursor: pointer;
    background: var(--surface); font-weight: 500; transition: background 0.15s;
  }
  .multi-check:hover { background: var(--surface2); }
  .multi-check input { width: 15px; height: 15px; cursor: pointer; }
  .note-box {
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 13px; color: var(--text2); margin-bottom: 10px;
  }

  /* Result */
  .result-score { font-size: 48px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; text-align: center; color: var(--accent); }
  .result-msg { font-size: 15px; color: var(--text2); text-align: center; margin-bottom: 1.5rem; }
  .result-list { display: flex; flex-direction: column; margin-bottom: 1.5rem; }
  .result-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .result-item .icon { font-weight: 700; min-width: 18px; font-size: 14px; }
  .result-item .icon.ok { color: var(--green-text); }
  .result-item .icon.ng { color: var(--red-text); }
  .result-item .icon.memo { color: var(--text2); }
  .result-item .detail { color: var(--text2); line-height: 1.5; }
  .action-row { display: flex; gap: 8px; }
  .action-row .btn { flex: 1; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="kamon">🌊</span>
    <div class="subtitle">予習シリーズ 5年上 第12回</div>
    <h1>中国・四国地方 復習クイズ</h1>
    <p class="total">全 <span id="total-count"></span> 問</p>
  </div>

  <!-- Start Screen -->
  <div id="start-screen">
    <div class="card">
      <div class="section-wrap">
        <div class="section-label">出題範囲を選んでください（複数選択可）</div>
        <div class="section-row">
          <button class="section-btn active" data-section="1" onclick="toggleSection(this)">大問1 瀬戸内工業</button>
          <button class="section-btn active" data-section="2" onclick="toggleSection(this)">大問2 昔の国・地形</button>
          <button class="section-btn active" data-section="3" onclick="toggleSection(this)">大問3 各地域の特色</button>
          <button class="section-btn active" data-section="4" onclick="toggleSection(this)">大問4 中国・四国の県</button>
        </div>
      </div>
      <div class="start-info">
        <div class="start-item"><div class="label">大問1</div><div class="value">瀬戸内工業地域</div></div>
        <div class="start-item"><div class="label">大問2</div><div class="value">昔の国・山・湖</div></div>
        <div class="start-item"><div class="label">大問3</div><div class="value">日本海・太平洋・瀬戸内</div></div>
        <div class="start-item"><div class="label">大問4</div><div class="value">中国・四国の県</div></div>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">クイズスタート →</button>
    </div>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen" class="hidden">
    <div class="progress-wrap">
      <div class="progress-label" id="q-label"></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog"></div></div>
      <div class="progress-label" id="q-counter"></div>
    </div>
    <div class="card">
      <div class="q-category" id="q-category"></div>
      <div class="q-text" id="q-text"></div>
    </div>
    <div id="input-area"></div>
    <div id="answer-area" class="hidden">
      <div id="answer-box" class="answer-box"></div>
      <button class="btn" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="hidden">
    <div class="card">
      <div class="result-score" id="result-score"></div>
      <div class="result-msg" id="result-msg"></div>
      <div class="result-list" id="result-detail"></div>
      <button class="btn btn-primary" id="retry-wrong-btn" style="margin-bottom:8px;" onclick="retryWrong()">まちがえた問題だけもう一度 →</button>
      <div class="action-row">
        <button class="btn" onclick="restartQuiz()">全問もう一度</button>
        <button class="btn" onclick="goHome()">トップへ</button>
      </div>
    </div>
  </div>

</div>
<script>
const allQuestions = [

  // ===== 大問1 瀬戸内工業地域 =====
  { section:1, category:"大問1・問1", text:"愛媛県でタオルの生産がさかんな都市はどこ？", type:"free", hints:["今治市","松山市","宇和島市","新居浜市"], answer:"今治市", explanation:"今治市（いまばりし）が正解。国内タオル生産量の約60%を占めます。" },
  { section:1, category:"大問1・問1", text:"広島県□市には製鉄所があります。□に入る都市名は？\nヒント：鉄鋼業と石油化学工業がさかんな都市です。", type:"free", hints:["福山","広島","呉","尾道"], answer:"福山", altAnswers:["福山市"], explanation:"福山市（ふくやまし）が正解。広島県東部に位置し、製鉄所がある工業都市です。" },
  { section:1, category:"大問1・問1", text:"岡山県倉敷市の□地区には、石油化学コンビナートと製鉄所の両方があります。□に入る地名は？", type:"free", hints:["水島","玉島","児島","茶屋町"], answer:"水島", altAnswers:["水島地区"], explanation:"水島（みずしま）が正解。倉敷市水島地区は大規模な工業地帯として有名です。" },
  { section:1, category:"大問1・問2", text:"広島県呉市ではある工業がさかんです。次のうち正しいものは？\nア：造船業　イ：石油化学　ウ：セメント工業　エ：自動車工業", type:"free", hints:["ア（造船業）","イ（石油化学）","ウ（セメント）","エ（自動車）"], answer:"ア（造船業）", altAnswers:["ア","造船業","造船"], explanation:"呉市（くれし）は造船業で有名な都市です。" },
  { section:1, category:"大問1・問1-3", text:"広島市について正しいものはどれ？\nI：太田川の三角州の上に広がり人口100万人超\nII：世界文化遺産の原爆ドームがある", type:"free", hints:["ア（I正・II正）","イ（I正・II誤）","ウ（I誤・II正）","エ（I誤・II誤）"], answer:"ア（I正・II正）", altAnswers:["ア","I正・II正"], explanation:"I・IIともに正しい。広島市は太田川デルタ上に発展し、人口約120万人の政令指定都市。原爆ドームは世界文化遺産です。" },
  { section:1, category:"大問1・問1-4", text:"鉄鋼業がさかんな広島県の都市はどれ？\nア：周南　イ：防府　ウ：呉　エ：福山", type:"free", hints:["エ（福山）","ア（周南）","イ（防府）","ウ（呉）"], answer:"エ（福山）", altAnswers:["エ","福山"], explanation:"福山市が正解。鉄鋼業がさかんで、製鉄所があります。" },
  { section:1, category:"大問1・問1-4", text:"中国地方にある日本三大名園は？\nア：偕楽園　イ：後楽園　ウ：兼六園", type:"free", hints:["偕楽園（茨城）","後楽園（岡山）","兼六園（石川）"], answer:"イ（後楽園）", altAnswers:["い","後楽園"], explanation:"岡山県に後楽園があります。" },
  { section:1, category:"大問1・問2", text:"徳島市の説明として正しいものを2つ選びなさい。\nア：日本三名園の1つがある\nイ：夏に阿波おどりが行われる\nウ：安芸の宮島がある\nエ：吉野川の河口がある", type:"multi", choices:["ア","イ","ウ","エ"], hints:["イ","エ","ア","ウ"], hintDetails:["イ：阿波おどりは毎年8月に行われる徳島の祭り","エ：吉野川は徳島県を流れ河口は徳島市付近","ア：後楽園は岡山市（徳島ではない）","ウ：安芸の宮島は広島県"], answer:["イ","エ"], explanation:"イとエが正しい。ア（後楽園）は岡山市、ウ（安芸の宮島）は広島県です。" },
  { section:1, category:"大問1・問3-1", text:"愛媛県南部の沿岸で鯛などが養殖されています。この海を「□□海」といいます。□は？", type:"free", hints:["宇和","土佐","豊後","紀伊"], answer:"宇和", altAnswers:["宇和海"], explanation:"宇和海（うわかい）が正解。愛媛県南部に広がる海です。" },
  { section:1, category:"大問1・問3-2", text:"広島県の収穫量が全国1位（2023年）の水産物で、広島湾でさかんに養殖されているものは？", type:"free", hints:["かき","のり","真珠","ほたて貝"], answer:"かき", explanation:"かき（牡蠣）が正解。広島県は全国一のかきの産地です。" },
  { section:1, category:"大問1・問4", text:"瀬戸内しまなみ海道が通る2つの県はどこ？", type:"free", hints:["広島県と愛媛県","岡山県と香川県","山口県と愛媛県","広島県と香川県"], answer:"広島県と愛媛県", altAnswers:["広島・愛媛","愛媛県と広島県"], explanation:"しまなみ海道は広島県（尾道）と愛媛県（今治）を結びます。自転車でも渡れます。" },
  { section:1, category:"大問1・問5", text:"中国・四国地方の伝統的工芸品の組み合わせとして正しいものをすべて選びなさい。\nア：鳥取県＝因州和紙　イ：岡山県＝備前焼\nウ：広島県＝熊野筆　エ：山口県＝萩焼", type:"multi", choices:["ア","イ","ウ","エ"], hints:["ア","イ","ウ","エ"], hintDetails:["ア：因州和紙は鳥取県の伝統工芸","イ：備前焼は岡山県の伝統工芸","ウ：熊野筆は広島県熊野町の伝統工芸","エ：萩焼は山口県の伝統工芸"], answer:["ア","イ","ウ","エ"], explanation:"ア〜エすべて正しい。ほかに高知県の土佐和紙も有名です。" },
  { section:1, category:"大問1・問8-1", text:"本州四国連絡橋のうち、瀬戸大橋について正しいものをすべて選びなさい。\nア：自動車のほか鉄道でも渡れる\nイ：淡路島を経由する\nウ：3ルートのうち最初に開通\nエ：本州側は広島県を通る", type:"multi", choices:["ア","イ","ウ","エ"], hints:["ア","ウ","イ","エ"], hintDetails:["ア：瀬戸大橋はJR予讃線も通る（自動車＋鉄道）","ウ：1988年開通、3ルートの中で最初","イ：淡路島経由は神戸〜鳴門ルート","エ：瀬戸大橋の本州側は岡山県（広島県ではない）"], answer:["ア","ウ"], explanation:"ア・ウが正しい。イは神戸〜鳴門ルートの説明。エは誤りで、瀬戸大橋の本州側は岡山県（児島）です。" },
  { section:1, category:"大問1・問8-1", text:"瀬戸内しまなみ海道の本州側の起点となる都市は？（○○市）", type:"free", hints:["尾道市","福山市","広島市","呉市"], answer:"尾道市", altAnswers:["尾道"], explanation:"尾道市（おのみちし）が正解。広島県に位置し、今治市（愛媛県）と結ばれています。" },
  { section:1, category:"大問1・問8-1", text:"瀬戸大橋の四国側の起点となる都市は？（○○市）", type:"free", hints:["坂出市","高松市","丸亀市","観音寺市"], answer:"坂出市", altAnswers:["坂出"], explanation:"坂出市（さかいでし）が正解。香川県に位置し、岡山県児島市と結ばれています。" },
  { section:1, category:"大問1・問8-2", text:"本州四国連絡橋が整備されたことで、人やものが大都市に吸い寄せられる「□効果」が起きました。□をカタカナで答えなさい。", type:"free", hints:["ストロー","サイフォン","ポンプ","バキューム"], answer:"ストロー", altAnswers:["ストロー効果"], explanation:"ストロー効果が正解。交通が便利になることで、地方の人や経済が大都市に流れ出てしまう現象です。" },
  { section:1, category:"大問1・問広島", text:"広島に原子爆弾が投下された日は？\nア：8月3日\nイ：8月6日\nウ：8月9日\nエ：8月15日", type:"free", hints:["イ（8月6日）","ア（8月3日）","ウ（8月9日）","エ（8月15日）"], answer:"イ（8月6日）", altAnswers:["イ","8月6日"], explanation:"8月6日が正解。8月9日は長崎への原爆投下の日、8月15日は終戦記念日です。" },

  // ===== 大問2 昔の国・地形 =====
  { section:2, category:"大問2・問1A", text:"中国地方最高峰で「伯耆富士」ともよばれる山は？（○山）", type:"free", hints:["大山","蒜山","三瓶山","比婆山"], answer:"大山", explanation:"大山（だいせん）が正解。鳥取県にある標高1729mの山です。" },
  { section:2, category:"大問2・問1B", text:"島根県東部にある「□大社」の□は？長い歴史をもつ神社です。", type:"free", hints:["出雲","熊野","春日","住吉"], answer:"出雲", explanation:"出雲大社（いずもたいしゃ）が正解。縁結びの神様として知られます。" },
  { section:2, category:"大問2・問2", text:"愛媛県の宇和海に面した、斜面を段状に切り開いた畑を何というか答えなさい。", type:"free", hints:["段々畑","棚田","テラス畑","斜面畑"], answer:"段々畑", explanation:"段々畑（だんだんばたけ）が正解。斜面を段状に切り開いた畑で、みかんなどを栽培しています。" },

let currentIndex=0, score=0, results=[], shuffled=[];
let activeSections = new Set([1,2,3,4]);
let hintShown = false, currentQ = null;

function toggleSection(btn) {
  const s = parseInt(btn.dataset.section);
  if (activeSections.has(s)) {
    if (activeSections.size === 1) return;
    activeSections.delete(s); btn.classList.remove('active');
  } else {
    activeSections.add(s); btn.classList.add('active');
  }
  document.getElementById('total-count').textContent = allQuestions.filter(q => activeSections.has(q.section)).length;
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

function startQuiz() {
  shuffled = shuffle(allQuestions.filter(q=>activeSections.has(q.section)));
  currentIndex=0; score=0; results=[];
  hide('start-screen'); show('quiz-screen');
  showQuestion();
}

function showQuestion() {
  currentQ = shuffled[currentIndex];
  const q = currentQ, total = shuffled.length;
  hintShown = false;
  document.getElementById('q-label').textContent = q.category;
  document.getElementById('q-counter').textContent = (currentIndex+1)+' / '+total;
  document.getElementById('prog').style.width = (currentIndex/total*100)+'%';
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.text;
  hide('answer-area');
  const ia = document.getElementById('input-area');
  ia.innerHTML = '';

  if (q.type === 'text') {
    const note = document.createElement('div');
    note.className = 'note-box';
    note.textContent = '記述問題です。自分で考えてから「答えを見る」を押してください。';
    ia.appendChild(note);
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = '答えを見る';
    btn.onclick = showTextAnswer;
    ia.appendChild(btn);

  } else if (q.type === 'multi') {
    const keys = ['ア','イ','ウ','エ'];
    const note = document.createElement('div');
    note.className = 'note-box';
    note.textContent = '正しいものをすべて選んでください';
    ia.appendChild(note);

    const row = document.createElement('div');
    row.className = 'multi-check-row';
    (q.choices || keys).forEach((c, i) => {
      const label = document.createElement('label');
      label.className = 'multi-check';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = keys[i];
      label.appendChild(cb);
      const sp = document.createElement('span');
      sp.textContent = ' ' + keys[i];
      label.appendChild(sp);
      row.appendChild(label);
    });
    ia.appendChild(row);

    const hintBtn = document.createElement('button');
    hintBtn.className = 'hint-toggle';
    hintBtn.textContent = '💡 ヒント（各選択肢の内容）を見る';
    hintBtn.onclick = function() { toggleHint(this); };
    ia.appendChild(hintBtn);

    const hintBox = document.createElement('div');
    hintBox.id = 'hint-box';
    hintBox.className = 'hint-box hidden';
    const hintLabel = document.createElement('div');
    hintLabel.className = 'hint-label';
    hintLabel.textContent = 'ヒント';
    hintBox.appendChild(hintLabel);
    if (q.hintDetails) {
      const hintContent = document.createElement('div');
      hintContent.style.cssText = 'font-size:14px;line-height:1.8;color:var(--yellow-text);';
      hintContent.innerHTML = q.hintDetails.map(d => '<div style="margin-bottom:4px;">・' + d + '</div>').join('');
      hintBox.appendChild(hintContent);
    }
    ia.appendChild(hintBox);

    const submitBtn = document.createElement('button');
    submitBtn.className = 'btn btn-primary';
    submitBtn.style.marginTop = '10px';
    submitBtn.textContent = '答える';
    submitBtn.onclick = submitMulti;
    ia.appendChild(submitBtn);

  } else {
    const inputRow = document.createElement('div');
    inputRow.className = 'input-row';
    const input = document.createElement('input');
    input.className = 'ans-input';
    input.id = 'ans-input';
    input.type = 'text';
    input.placeholder = 'ここに答えを入力…';
    input.autocomplete = 'off';
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') submitAnswer(); });
    inputRow.appendChild(input);
    const submitBtn = document.createElement('button');
    submitBtn.className = 'btn btn-primary btn-sm';
    submitBtn.textContent = '答える';
    submitBtn.onclick = submitAnswer;
    inputRow.appendChild(submitBtn);
    ia.appendChild(inputRow);

    const hintBtn = document.createElement('button');
    hintBtn.className = 'hint-toggle';
    hintBtn.textContent = '💡 ヒント（選択肢）を見る';
    hintBtn.onclick = function() { toggleHint(this); };
    ia.appendChild(hintBtn);

    const hintBox = document.createElement('div');
    hintBox.id = 'hint-box';
    hintBox.className = 'hint-box hidden';
    const hintLabel = document.createElement('div');
    hintLabel.className = 'hint-label';
    hintLabel.textContent = 'ヒント：選択肢';
    hintBox.appendChild(hintLabel);
    const hintChoices = document.createElement('div');
    hintChoices.className = 'hint-choices';
    q.hints.forEach(function(h) {
      const sp = document.createElement('span');
      sp.className = 'hint-choice';
      sp.textContent = h;
      sp.onclick = function() { fillHint(h); };
      hintChoices.appendChild(sp);
    });
    hintBox.appendChild(hintChoices);
    ia.appendChild(hintBox);

    setTimeout(function() { const el = document.getElementById('ans-input'); if (el) el.focus(); }, 100);
  }
}

function toggleHint(btn) {
  const box = document.getElementById('hint-box');
  if (!box) return;
  box.classList.toggle('hidden');
  hintShown = true;
}

function fillHint(val) {
  const input = document.getElementById('ans-input');
  if (input) { input.value = val; input.focus(); }
}

function normalize(str) {
  return str.trim().replace(/\s+/g,'').replace(/[　]/g,'').toLowerCase()
    .replace(/[ａ-ｚＡ-Ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
}

function checkAnswer(user, q) {
  const u = normalize(user);
  if (u === normalize(q.answer)) return true;
  if (q.altAnswers) for (const alt of q.altAnswers) if (u === normalize(alt)) return true;
  return false;
}

function submitAnswer() {
  const q = currentQ;
  const input = document.getElementById('ans-input');
  if (!input || !input.value.trim()) return;
  input.disabled = true;
  showAnswerBox(checkAnswer(input.value.trim(), q), q);
}

function submitMulti() {
  const q = currentQ;
  const checked = [...document.querySelectorAll('.multi-check input:checked')].map(el=>el.value).sort();
  document.querySelectorAll('.multi-check input').forEach(el=>el.disabled=true);
  showAnswerBox(JSON.stringify(checked)===JSON.stringify([...q.answer].sort()), q);
}

function showTextAnswer() {
  const q = currentQ;
  document.getElementById('input-area').innerHTML = '';
  show('answer-area');
  const ab = document.getElementById('answer-box');
  ab.className = 'answer-box neutral';
  ab.innerHTML = `<div class="mark">📝 模範解答</div><div class="correct-ans">${q.answer}</div><div class="exp">${q.explanation}</div>`;
  results.push({q, correct:null});
}

function showAnswerBox(isCorrect, q) {
  document.getElementById('input-area').innerHTML = ''; show('answer-area');
  if (isCorrect) score++;
  const ab = document.getElementById('answer-box');
  ab.className = 'answer-box '+(isCorrect?'correct':'wrong');
  const ansText = Array.isArray(q.answer)?q.answer.join('・'):q.answer;
  const hintNote = hintShown&&isCorrect?'<div style="font-size:12px;margin-top:4px;opacity:0.7;">（ヒントあり）</div>':'';
  ab.innerHTML = `<div class="mark">${isCorrect?'◯ 正解！':'✕ 不正解'}</div>${hintNote}<div class="correct-ans">正解：${ansText}</div><div class="exp">${q.explanation}</div>`;
  results.push({q, correct:isCorrect});
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= shuffled.length) showResult();
  else showQuestion();
}

function showResult() {
  hide('quiz-screen'); show('result-screen');
  document.getElementById('retry-wrong-btn').style.display='block';
  const judged = results.filter(r=>r.correct!==null);
  const sc = judged.filter(r=>r.correct).length;
  document.getElementById('result-score').textContent = sc+' / '+judged.length+' 問正解';
  const pct = judged.length>0?Math.round(sc/judged.length*100):0;
  document.getElementById('result-msg').textContent = pct>=80?'🎉 すばらしい！完璧に近いです':pct>=60?'もう少し！もう一度チャレンジしよう':'もう一度しっかり復習しよう！';
  const wrongCount = results.filter(r=>r.correct===false).length;
  const rb = document.getElementById('retry-wrong-btn');
  if(wrongCount===0) rb.style.display='none';
  else rb.textContent=`まちがえた ${wrongCount} 問だけもう一度 →`;
  document.getElementById('result-detail').innerHTML = results.map(r=>{
    const icon=r.correct===null?'📝':r.correct?'◯':'✕';
    const cls=r.correct===null?'memo':r.correct?'ok':'ng';
    return `<div class="result-item"><span class="icon ${cls}">${icon}</span><span class="detail">${r.q.category}：${r.q.text.slice(0,28)}…</span></div>`;
  }).join('');
}

function retryWrong() {
  const wrong = results.filter(r=>r.correct===false).map(r=>r.q);
  if(!wrong.length) return;
  shuffled = shuffle(wrong);
  currentIndex=0; score=0; results=[];
  hide('result-screen'); show('quiz-screen');
  showQuestion();
}
function restartQuiz() { hide('result-screen'); startQuiz(); }
function goHome() { hide('result-screen'); show('start-screen'); }

document.getElementById('total-count').textContent = allQuestions.length;
</script>
</body>
